name: Release

# Publishes sdist + wheel to PyPI on push of a v* tag.
# Uses PyPI's OIDC "trusted publisher" — no API token or repo secret.
# The PyPI ↔ GitHub mapping (this repo + this workflow file) is
# pre-configured at https://pypi.org/manage/account/publishing/ as a
# pending publisher; first publish converts it to active.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF##*/}"          # v0.1.0a1
          tag_version="${tag#v}"           # 0.1.0a1
          pkg_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ${tag} does not match pyproject.toml version ${pkg_version}"
            exit 1
          fi
          echo "tag=${tag}, version=${pkg_version}"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Smoke install + import from wheel
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install --quiet dist/phionyx_langchain_langgraph-*.whl
          /tmp/wheel-smoke/bin/python -c "import phionyx_langchain_langgraph; print('phionyx_langchain_langgraph import: ok')"

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/phionyx-langchain-langgraph
    permissions:
      id-token: write   # OIDC trusted-publisher exchange
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No 'with: password:' — trusted publisher uses OIDC.
